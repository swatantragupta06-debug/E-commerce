<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- MOBILE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <meta name="description" content="Admin Dashboard - THE HARDOI STORE manage products and orders">
    <meta name="keywords" content="Hardoi admin, manage store Hardoi, THE HARDOI STORE admin">

    <!-- GOOGLE VERIFICATION -->
    <meta name="google-site-verification" content="vMgwqCstE6HX16VuAHh2bEywRmITYN5LEx3KHmPw7Ls" />

    <title>Admin Dashboard - THE HARDOI STORE</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body class="admin-page">

    <!-- NAVBAR -->
    <nav class="admin-navbar">
        <div class="nav-container">
            <h2>THE HARDOI STORE - Admin</h2>
            <button id="adminLogoutBtn" class="logout-btn">Logout</button>
        </div>
    </nav>

    <div class="admin-container">

        <!-- PRODUCTS -->
        <div class="admin-section">
            <h2>Manage Products</h2>

            <form id="addProductForm" class="admin-form">
                <input type="text" id="productName" placeholder="Product Name" required>
                <input type="number" id="productPrice" placeholder="Price (₹)" required>

                <input type="text" id="productImage" placeholder="Image URL (paste link)" required>

                <textarea id="productDesc" placeholder="Description"></textarea>

                <button type="submit">Add Product</button>
            </form>

            <div id="productsList" class="admin-list"></div>
        </div>

        <!-- ORDERS -->
        <div class="admin-section">
            <h2>Manage Orders</h2>
            <div id="adminOrdersList" class="admin-list"></div>
        </div>

    </div>

    <!-- EDIT PRODUCT MODAL -->
    <div id="editProductModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeEditModal">&times;</span>

            <form id="editProductForm">
                <input type="hidden" id="editProductId">

                <input type="text" id="editProductName" placeholder="Product Name" required>
                <input type="number" id="editProductPrice" placeholder="Price (₹)" required>

                <input type="text" id="editProductImage" placeholder="Image URL">

                <textarea id="editProductDesc" placeholder="Description"></textarea>

                <button type="submit">Update Product</button>
            </form>
        </div>
    </div>

    <!-- 🔥 FIXED ADMIN SECURITY -->
    <script>
        // ✅ SIMPLE & WORKING ADMIN CHECK
        if (localStorage.getItem("isAdmin") !== "true") {
            alert("Access Denied");
            window.location.href = "login.html";
        }

        // 🚪 LOGOUT
        document.getElementById("adminLogoutBtn").addEventListener("click", () => {
            localStorage.removeItem("isAdmin"); // remove admin access
            window.location.href = "login.html";
        });
    </script>

    <!-- MAIN SCRIPT -->
    <script type="module" src="script.js"></script>

</body>
</html>
