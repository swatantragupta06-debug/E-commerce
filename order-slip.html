<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Slip - THE HARDOI STORE</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        /* Print Optimization */
        @media print {
            body {
                background: white;
            }
            .print-btn {
                display: none;
            }
        }
    </style>
</head>

<body class="order-slip-page">

<div class="order-slip-container">
    <div class="order-slip">

        <!-- HEADER -->
        <div class="slip-header">
            <h1>THE HARDOI STORE</h1>
            <p>Fast Delivery in Hardoi</p>
            <div class="delivery-label">DELIVERY</div>
        </div>

        <!-- BODY -->
        <div class="slip-body">
            <div id="slipContent">
                Loading order details...
            </div>
        </div>

        <!-- FOOTER -->
        <div class="slip-footer">
            <button onclick="window.print()" class="print-btn">
                <i class="fas fa-print"></i> Print Order Slip
            </button>
            <p>Thank you for shopping with us!</p>
        </div>

    </div>
</div>

<!-- 🔥 FULL WORKING SCRIPT -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBp7WnJsnKC7MvYygSn9xgUA627CsZS0Yc",
  authDomain: "my-shopping-site-f801f.firebaseapp.com",
  projectId: "my-shopping-site-f801f",
  storageBucket: "my-shopping-site-f801f.firebasestorage.app",
  messagingSenderId: "818044215511",
  appId: "1:818044215511:web:108425d16b36a4e9ab1092"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 📦 GET ORDER ID FROM URL
const params = new URLSearchParams(window.location.search);
const orderId = params.get("id");

// LOAD ORDER
async function loadOrder() {
    if (!orderId) {
        document.getElementById("slipContent").innerHTML = "Invalid Order ID";
        return;
    }

    const docRef = doc(db, "orders", orderId);
    const docSnap = await getDoc(docRef);

    if (!docSnap.exists()) {
        document.getElementById("slipContent").innerHTML = "Order not found";
        return;
    }

    const order = docSnap.data();

    document.getElementById("slipContent").innerHTML = `
        <div class="slip-box">

            <p><strong>Order ID:</strong> ${orderId}</p>
            <p><strong>Date:</strong> ${order.date}</p>

            <hr>

            <p><strong>Name:</strong> ${order.name}</p>
            <p><strong>Phone:</strong> ${order.phone}</p>
            <p><strong>Address:</strong> ${order.address}, ${order.city}</p>

            <hr>

            <p><strong>Product:</strong> ${order.productName}</p>
            <p><strong>Price:</strong> ₹${order.price}</p>
            <p><strong>Delivery Charge:</strong> ₹${order.deliveryCharge}</p>

            <hr>

            <p><strong>Payment Mode:</strong> Cash on Delivery</p>
            <p><strong>Status:</strong> ${order.status}</p>

        </div>
    `;
}

loadOrder();

</script>

</body>
  </html>
